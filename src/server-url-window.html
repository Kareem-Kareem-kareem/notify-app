<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Set server URL</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, "Segoe UI", Arial, sans-serif;
        background: #0b0d12;
        color: #f4f1ec;
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100vh;
        padding: 0 22px;
        box-sizing: border-box;
      }
      h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 6px;
      }
      p {
        font-size: 12px;
        color: #7c8496;
        margin: 0 0 12px;
        line-height: 1.5;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #242a36;
        background: #141821;
        color: #f4f1ec;
        font-size: 14px;
        outline: none;
      }
      input:focus {
        border-color: #ff8a3d;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        justify-content: flex-end;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .save {
        background: #ff8a3d;
        color: #1a0f04;
      }
      .cancel {
        background: #1c212c;
        color: #c9cfdb;
      }
    </style>
  </head>
  <body>
    <h1>Room server address</h1>
    <p>
      Paste the site address shown in your browser for the Notify project
      (e.g. your-project-name.replit.app). No need to type https:// or /api.
    </p>
    <input id="url" autofocus />
    <div class="row">
      <button class="cancel" id="cancel">Cancel</button>
      <button class="save" id="save">Save</button>
    </div>
    <script>
      const { ipcRenderer } = require("electron");
      const input = document.getElementById("url");
      ipcRenderer.on("prefill", (_e, value) => {
        input.value = value || "";
        input.focus();
        input.select();
      });
      function submit() {
        ipcRenderer.send("server-url-submit", input.value);
      }
      document.getElementById("save").addEventListener("click", submit);
      document
        .getElementById("cancel")
        .addEventListener("click", () =>
          ipcRenderer.send("server-url-cancel"),
        );
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") submit();
        if (e.key === "Escape") ipcRenderer.send("server-url-cancel");
      });
    </script>
  </body>
</html>
